name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: production
      url: https://www.flussdeslebens.live
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull production environment variables
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for production
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to production
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

# Required repository secrets:
#   VERCEL_TOKEN      – Vercel API token (https://vercel.com/account/tokens)
#   VERCEL_ORG_ID     – Vercel team/org ID (found in Vercel team settings)
#   VERCEL_PROJECT_ID – Vercel project ID (found in Vercel project settings → General)
#
# Required environment variables in Vercel (production):
#   NEXTAUTH_SECRET  – a long random string (e.g. openssl rand -base64 32)
#   NEXTAUTH_URL     – https://www.flussdeslebens.live
#   GITHUB_TOKEN     – a Personal Access Token with "repo" scope (for data persistence)
#   GITHUB_OWNER     – Creator-Mario
#   GITHUB_REPO      – Forschen
