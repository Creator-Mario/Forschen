name: Deploy to Production

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-production:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    environment:
      name: production
      url: https://www.flussdeslebens.live
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Check Vercel secrets
        id: check
        run: |
          if [ -z "${VERCEL_TOKEN}" ]; then
            echo "::warning title=Vercel deployment skipped::VERCEL_TOKEN is not configured. Set VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID in repository secrets to enable GitHub Actions deployment. The site is still auto-deployed by Vercel's native git integration."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Vercel CLI
        if: steps.check.outputs.configured == 'true'
        run: npm install --global vercel@latest

      - name: Pull production environment variables
        if: steps.check.outputs.configured == 'true'
        run: |
          for attempt in 1 2 3; do
            if vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "vercel pull failed after ${attempt} attempts."
              exit 1
            fi
            echo "vercel pull failed on attempt ${attempt}. Retrying..."
            sleep $((attempt * 10))
          done

      - name: Build for production
        if: steps.check.outputs.configured == 'true'
        run: |
          for attempt in 1 2 3; do
            if vercel build --prod --token="${VERCEL_TOKEN}"; then
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "vercel build failed after ${attempt} attempts."
              exit 1
            fi
            echo "vercel build failed on attempt ${attempt}. Retrying..."
            sleep $((attempt * 10))
          done

      - name: Deploy to production
        if: steps.check.outputs.configured == 'true'
        id: deploy
        run: |
          for attempt in 1 2 3; do
            output=$(vercel deploy --prebuilt --prod --token="${VERCEL_TOKEN}" 2>&1) && status=0 || status=$?
            echo "$output"
            if [ "$status" -eq 0 ]; then
              url=$(printf '%s\n' "$output" | tail -n 1)
              echo "url=$url" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            if [ "$attempt" -eq 3 ]; then
              echo "vercel deploy failed after ${attempt} attempts."
              exit "$status"
            fi
            echo "vercel deploy failed on attempt ${attempt}. Retrying..."
            sleep $((attempt * 10))
          done

# Required repository secrets:
#   VERCEL_TOKEN      – Vercel API token (https://vercel.com/account/tokens)
#   VERCEL_ORG_ID     – Vercel team/org ID (found in Vercel team settings)
#   VERCEL_PROJECT_ID – Vercel project ID (found in Vercel project settings → General)
#
# Required environment variables in Vercel (production):
#   NEXTAUTH_SECRET  – a long random string (e.g. openssl rand -base64 32)
#   NEXTAUTH_URL     – https://www.flussdeslebens.live
#   GITHUB_TOKEN     – a Personal Access Token with "repo" scope (for data persistence)
#   GITHUB_OWNER     – Creator-Mario
#   GITHUB_REPO      – Forschen
