name: Deploy to Railway

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: Install Railway CLI
        run: npm install -g @railway/cli
      - name: Deploy to Railway
        timeout-minutes: 10
        run: |
          set -euo pipefail

          max_attempts=3
          attempt=1

          until railway up --service Forschen; do
            if [ "$attempt" -ge "$max_attempts" ]; then
              echo "Railway deployment failed after $attempt attempts."
              exit 1
            fi

            echo "Railway deployment attempt $attempt failed. Retrying in 15 seconds..."
            attempt=$((attempt + 1))
            sleep 15
          done
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
