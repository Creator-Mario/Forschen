name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prepare for static export
        # Middleware and API routes require a server runtime and are not compatible with
        # static export. Auth and API features are unavailable on GitHub Pages; client-side
        # ProtectedRoute components already handle access control in the browser.
        # These files are removed only in this ephemeral CI environment – the repository
        # itself is not modified.
        run: |
          echo "export {};" > src/middleware.ts
          rm -rf src/app/api

      - name: Build static site
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          # NEXTAUTH_SECRET is required by next-auth at build time even though auth is
          # non-functional on a static export.  A real secret is unnecessary here; use
          # the repository secret if you want to avoid a hardcoded placeholder.
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'github-pages-build-placeholder' }}
          NEXTAUTH_URL: https://creator-mario.github.io/Forschen

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
