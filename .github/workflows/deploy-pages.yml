name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Prepare for static export
        # Middleware, API routes, and server-only pages are not compatible with static
        # export. Auth and API features are unavailable on GitHub Pages; client-side
        # ProtectedRoute components already handle access control in the browser.
        # The admin area requires server-side API routes and NextAuth – it is removed
        # so visitors receive a clean 404 rather than a broken non-functional UI.
        # The chat/[userId] page relies on server-side APIs and cannot be statically
        # rendered. Pages with `dynamic = "force-dynamic"` must have that directive
        # removed so Next.js can render them statically at build time with whatever
        # data is present in the repository JSON files.
        # These changes are made only in this ephemeral CI environment –
        # the repository itself is not modified.
        run: |
          echo "export {};" > src/middleware.ts
          rm -rf src/app/api
          rm -rf "src/app/(admin)"
          rm -rf "src/app/(user)/chat/[userId]"
          # Remove `force-dynamic` so all remaining pages are statically exportable.
          find src/app -name "*.tsx" -o -name "*.ts" | \
            xargs grep -rl "export const dynamic" | \
            xargs sed -i "/^export const dynamic/d"

      - name: Build static site
        run: npm run build
        env:
          GITHUB_PAGES: "true"
          # Tells client-side code that auth/API features are unavailable on this static
          # export so it can show an appropriate "not available" notice.
          NEXT_PUBLIC_GITHUB_PAGES: "true"
          # NEXTAUTH_SECRET is required by next-auth at build time even though auth is
          # non-functional on a static export.  A real secret is unnecessary here; use
          # the repository secret if you want to avoid a hardcoded placeholder.
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'github-pages-build-placeholder' }}
          NEXTAUTH_URL: https://creator-mario.github.io/Forschen

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
