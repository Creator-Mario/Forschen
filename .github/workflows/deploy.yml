name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: notify vercel
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: 'Vercel - forschen: lint'

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXTAUTH_SECRET: ci-build-secret
          NEXTAUTH_URL: http://localhost:3000

# Production deployment is handled by deploy-production.yml (push to main / workflow_dispatch).
# Keeping deploy-production out of this workflow avoids a "skipped" check on every PR.
# Connect this repository at https://vercel.com/new
# Required environment variables in Vercel:
#   NEXTAUTH_SECRET  – a long random string (e.g. openssl rand -base64 32)
#   NEXTAUTH_URL     – your Vercel URL, e.g. https://forschen.vercel.app
#   GITHUB_TOKEN     – a Personal Access Token with "repo" scope (for data persistence)
#   GITHUB_OWNER     – Creator-Mario
#   GITHUB_REPO      – Forschen
#
# Staging environment (deploy-staging.yml workflow):
#   Push to the "staging" branch to trigger a deployment to the custom Vercel
#   "staging" environment.  The following repository secrets are required:
#   VERCEL_TOKEN      – Vercel API token (https://vercel.com/account/tokens)
#   VERCEL_ORG_ID     – Vercel team/org ID (found in team settings)
#   VERCEL_PROJECT_ID – Vercel project ID (found in project settings)
#   Environment variables for staging can be managed with:
#     vercel env add MY_KEY staging
#     vercel pull --environment=staging

