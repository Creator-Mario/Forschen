name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: notify vercel
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: 'Vercel - forschen: lint'

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          NEXTAUTH_SECRET: ci-build-secret
          NEXTAUTH_URL: http://localhost:3000

  deploy-production:
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    permissions:
      contents: read
    environment:
      name: production
      url: https://www.flussleben.live
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull production environment variables
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build for production
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Deploy to production
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

# Required repository secrets for production deployment:
#   VERCEL_TOKEN      – Vercel API token (https://vercel.com/account/tokens)
#   VERCEL_ORG_ID     – Vercel team/org ID (found in Vercel team settings)
#   VERCEL_PROJECT_ID – Vercel project ID (found in Vercel project settings → General)
#
# Required environment variables in Vercel (production):
#   NEXTAUTH_SECRET  – a long random string (e.g. openssl rand -base64 32)
#   NEXTAUTH_URL     – https://www.flussleben.live
#   GITHUB_TOKEN     – a Personal Access Token with "repo" scope (for data persistence)
#   GITHUB_OWNER     – Creator-Mario
#   GITHUB_REPO      – Forschen
#
# Staging environment (deploy-staging.yml workflow):
#   Push to the "staging" branch to trigger a deployment to the custom Vercel
#   "staging" environment.  The following repository secrets are required:
#   VERCEL_TOKEN      – Vercel API token (https://vercel.com/account/tokens)
#   VERCEL_ORG_ID     – Vercel team/org ID (found in team settings)
#   VERCEL_PROJECT_ID – Vercel project ID (found in project settings)
#   Environment variables for staging can be managed with:
#     vercel env add MY_KEY staging
#     vercel pull --environment=staging

