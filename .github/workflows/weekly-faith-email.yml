name: Weekly Faith Email

on:
  schedule:
    # Runs every Monday after the weekly theme has been generated
    - cron: '30 6 * * 1'
  workflow_dispatch:

concurrency:
  group: weekly-faith-email
  cancel-in-progress: false

jobs:
  send-weekly-faith-email:
    runs-on: ubuntu-latest
    permissions: {}

    steps:
      - name: Check weekly faith email configuration
        id: check
        env:
          SITE_URL: ${{ vars.SITE_URL || vars.EMAIL_LINK_BASE_URL || vars.NEXTAUTH_URL || 'https://flussdeslebens.live' }}
          WEEKLY_FAITH_EMAIL_CRON_SECRET: ${{ secrets.WEEKLY_FAITH_EMAIL_CRON_SECRET }}
        run: |
          if [ -z "$WEEKLY_FAITH_EMAIL_CRON_SECRET" ]; then
            echo "::warning title=Weekly faith email skipped::WEEKLY_FAITH_EMAIL_CRON_SECRET is not configured."
            echo "::warning title=Weekly faith email skipped::Set WEEKLY_FAITH_EMAIL_CRON_SECRET in repository secrets."
            echo "configured=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "configured=true" >> "$GITHUB_OUTPUT"

      - name: Trigger weekly faith email delivery
        if: steps.check.outputs.configured == 'true'
        env:
          SITE_URL: ${{ vars.SITE_URL || vars.EMAIL_LINK_BASE_URL || vars.NEXTAUTH_URL || 'https://flussdeslebens.live' }}
          WEEKLY_FAITH_EMAIL_CRON_SECRET: ${{ secrets.WEEKLY_FAITH_EMAIL_CRON_SECRET }}
        run: |
          curl --fail-with-body \
            --retry 3 \
            --retry-all-errors \
            --retry-delay 10 \
            --connect-timeout 10 \
            --max-time 60 \
            --request POST \
            --header "Authorization: Bearer $WEEKLY_FAITH_EMAIL_CRON_SECRET" \
            "${SITE_URL%/}/api/internal/weekly-faith-email"
