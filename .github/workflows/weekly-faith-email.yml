name: Weekly Faith Email

on:
  schedule:
    # Runs every Monday after the weekly theme has been generated
    - cron: '30 6 * * 1'
  workflow_dispatch:

concurrency:
  group: weekly-faith-email
  cancel-in-progress: false

jobs:
  send-weekly-faith-email:
    runs-on: ubuntu-latest
    permissions: {}
    env:
      SITE_URL: ${{ vars.SITE_URL || vars.EMAIL_LINK_BASE_URL || vars.NEXTAUTH_URL || 'https://www.flussdeslebens.live' }}

    steps:
      - name: Check weekly faith email configuration
        id: check
        env:
          WEEKLY_FAITH_EMAIL_CRON_SECRET: ${{ secrets.WEEKLY_FAITH_EMAIL_CRON_SECRET }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -n "$WEEKLY_FAITH_EMAIL_CRON_SECRET" ]; then
            echo "primary_secret=weekly" >> "$GITHUB_OUTPUT"
            echo "has_fallback=$([ -n "$CRON_SECRET" ] && echo true || echo false)" >> "$GITHUB_OUTPUT"
            echo "configured=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "$CRON_SECRET" ]; then
            echo "::warning title=Weekly faith email fallback::WEEKLY_FAITH_EMAIL_CRON_SECRET is not configured. Falling back to CRON_SECRET."
            echo "primary_secret=legacy" >> "$GITHUB_OUTPUT"
            echo "has_fallback=false" >> "$GITHUB_OUTPUT"
            echo "configured=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "::warning title=Weekly faith email skipped::Neither WEEKLY_FAITH_EMAIL_CRON_SECRET nor CRON_SECRET is configured."
          echo "::warning title=Weekly faith email skipped::Set at least one matching repository secret for the deployed app."
          echo "primary_secret=none" >> "$GITHUB_OUTPUT"
          echo "has_fallback=false" >> "$GITHUB_OUTPUT"
          echo "configured=false" >> "$GITHUB_OUTPUT"
          exit 0
        shell: bash

      - name: Trigger weekly faith email delivery
        if: steps.check.outputs.configured == 'true'
        env:
          WEEKLY_FAITH_EMAIL_CRON_SECRET: ${{ secrets.WEEKLY_FAITH_EMAIL_CRON_SECRET }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          PRIMARY_SECRET: ${{ steps.check.outputs.primary_secret }}
          HAS_FALLBACK: ${{ steps.check.outputs.has_fallback }}
        run: |
          set -euo pipefail

          trigger_delivery() {
            local secret="$1"
            local label="$2"

            if [ -z "$secret" ]; then
              return 1
            fi

            echo "Triggering weekly faith email delivery with ${label} secret."

            local response_file
            response_file="$(mktemp)"

            local http_status
            http_status="$(
              curl --silent --show-error \
                --output "$response_file" \
                --write-out "%{http_code}" \
                --retry 3 \
                --retry-all-errors \
                --retry-delay 10 \
                --connect-timeout 10 \
                --max-time 60 \
                --request POST \
                --header "Authorization: Bearer $secret" \
                --header "X-Weekly-Faith-Email-Secret: $secret" \
                --header "X-Cron-Secret: $secret" \
                "${SITE_URL%/}/api/internal/weekly-faith-email"
            )"

            if [ "$http_status" -ge 200 ] && [ "$http_status" -lt 300 ]; then
              cat "$response_file"
              rm -f "$response_file"
              return 0
            fi

            echo "::warning title=Weekly faith email trigger failed::Attempt with ${label} secret returned HTTP ${http_status}."
            cat "$response_file"
            rm -f "$response_file"
            return 1
          }

          if [ "$PRIMARY_SECRET" = "weekly" ]; then
            if trigger_delivery "$WEEKLY_FAITH_EMAIL_CRON_SECRET" "dedicated"; then
              exit 0
            fi

            can_use_fallback=false
            if [ "$HAS_FALLBACK" = "true" ] && [ -n "$CRON_SECRET" ]; then
              if [ "$CRON_SECRET" != "$WEEKLY_FAITH_EMAIL_CRON_SECRET" ]; then
                can_use_fallback=true
              fi
            fi

            if [ "$can_use_fallback" = "true" ]; then
              echo "Retrying weekly faith email delivery with legacy fallback secret."
              trigger_delivery "$CRON_SECRET" "legacy fallback"
              exit 0
            fi

            echo "::error title=Weekly faith email failed::No working secret matched the deployed weekly faith email endpoint."
            exit 1
          fi

          if trigger_delivery "$CRON_SECRET" "legacy"; then
            exit 0
          fi

          exit 1
        shell: bash
