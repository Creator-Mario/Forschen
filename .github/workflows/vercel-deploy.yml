name: Deploy to Vercel (Production)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Check Vercel secrets
        id: check
        run: |
          if [ -z "${VERCEL_TOKEN}" ]; then
            echo "::warning title=Vercel deployment skipped::VERCEL_TOKEN is not configured. Set VERCEL_TOKEN, VERCEL_ORG_ID, and VERCEL_PROJECT_ID in repository secrets to enable GitHub Actions deployment."
            echo "configured=false" >> "$GITHUB_OUTPUT"
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Vercel CLI
        if: steps.check.outputs.configured == 'true'
        run: npm install --global vercel@latest

      - name: Pull environment variables
        if: steps.check.outputs.configured == 'true'
        run: vercel pull --yes --environment=production --token="${VERCEL_TOKEN}"

      - name: Build project
        if: steps.check.outputs.configured == 'true'
        run: vercel build --prod --token="${VERCEL_TOKEN}"

      - name: Deploy to Vercel
        if: steps.check.outputs.configured == 'true'
        run: vercel deploy --prebuilt --prod --token="${VERCEL_TOKEN}"
