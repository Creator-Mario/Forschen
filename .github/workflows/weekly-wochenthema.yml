name: Weekly Theme Generation

on:
  schedule:
    # Runs every Sunday shortly after the new publication week begins in Berlin
    - cron: '5 2 * * 0'
  workflow_dispatch:

concurrency:
  group: automated-content-updates
  cancel-in-progress: false

jobs:
  generate-wochenthema:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Generate weekly theme
        run: node scripts/weekly-theme/generate.cjs

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/wochenthema.json

          if git diff --staged --quiet; then
            echo "No Wochenthema changes to commit."
            exit 0
          fi

          publication_week=$(node scripts/weekly-theme/latest-week.cjs)
          git commit -m "chore: add weekly theme for ${publication_week}"

          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Push failed after ${attempt} attempts."
              exit 1
            fi

            git rebase --abort || true
            echo "Push failed on attempt ${attempt}. Retrying..."
            sleep $((attempt * 10))
          done
