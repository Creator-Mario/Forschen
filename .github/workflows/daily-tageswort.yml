name: Daily Tageswort Generation

on:
  schedule:
    # GitHub cron runs in UTC. Running at both 01:05 and 02:05 UTC covers
    # 03:05 Europe/Berlin across summer and winter time without missing the switch.
    - cron: '5 1 * * *'
    - cron: '5 2 * * *'
  workflow_dispatch:

concurrency:
  group: automated-content-updates
  cancel-in-progress: false

jobs:
  generate-tageswort:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Generate daily Tageswort entry
        run: |
          node << 'EOF'
          const fs = require('fs');
          const path = require('path');
          const {
            DEFAULT_TAGESWORT_ARCHIVE_LIMIT,
            appendAndPrune,
            generateTageswortEntries,
            getBerlinPublicationDate,
          } = require('./src/lib/tageswort-rotation.js');

          const today = getBerlinPublicationDate();
          const dataPath = path.join(process.cwd(), 'data', 'tageswort.json');
          const templatesPath = path.join(process.cwd(), 'data', 'tageswort-templates.json');
          const existing = JSON.parse(fs.readFileSync(dataPath, 'utf-8'));
          const templates = JSON.parse(fs.readFileSync(templatesPath, 'utf-8'));
          const newEntries = generateTageswortEntries(existing, templates, today);

          if (newEntries.length === 0) {
            console.log('Tageswort for today already exists, skipping.');
            process.exit(0);
          }

          const { entries, prunedCount } = appendAndPrune(
            existing,
            newEntries,
            DEFAULT_TAGESWORT_ARCHIVE_LIMIT
          );

          fs.writeFileSync(
            dataPath,
            JSON.stringify(entries, null, 2),
            'utf-8'
          );
          console.log(
            `Generated ${newEntries.length} Tageswort entr${newEntries.length === 1 ? 'y' : 'ies'} through ${today}.`
          );
          if (prunedCount > 0) {
            console.log(`Pruned ${prunedCount} archived Tageswort entr${prunedCount === 1 ? 'y' : 'ies'}.`);
          }
          EOF

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add data/tageswort.json

          if git diff --staged --quiet; then
            echo "No Tageswort changes to commit."
            exit 0
          fi

          publication_date=$(node -e "const fs = require('fs'); const entries = JSON.parse(fs.readFileSync('data/tageswort.json', 'utf8')).filter(entry => entry.published).sort((a, b) => a.date.localeCompare(b.date)); const publicationDate = entries.at(-1)?.date; if (!publicationDate) { throw new Error('No published Tageswort entry found after generation.'); } process.stdout.write(publicationDate);")
          git commit -m "chore: add daily Tageswort for ${publication_date}"

          for attempt in 1 2 3; do
            if git pull --rebase origin main && git push origin HEAD:main; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "Push failed after ${attempt} attempts."
              exit 1
            fi

            git rebase --abort || true
            echo "Push failed on attempt ${attempt}. Retrying..."
            sleep $((attempt * 10))
          done
